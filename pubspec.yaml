name: ethiograde
description: AI-powered offline grading tool for Ethiopian teachers (Grades 1-12 & Universities).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # PDF & Excel
  pdf: ^3.10.7
  printing: ^5.12.0
  excel: ^4.0.3
  file_picker: ^6.1.1
  open_file: ^3.3.2

  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  record: ^5.0.4

  # ML (placeholders for local models)
  tflite_flutter: ^0.10.4
  google_mlkit_text_recognition: ^0.11.0
  # google_mlkit_commons is transitive — don't pin it directly

  # Security
  flutter_secure_storage: ^9.0.0

  # UI & Utilities
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.3
  intl: ^0.20.0
  uuid: ^4.2.2
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/models/

  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
